<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑故事 - XTALE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #141423;
            --bg-card: #1a1a2e;
            --bg-hover: #25253b;
            --text-primary: #ffffff;
            --text-secondary: #b8b8d0;
            --text-muted: #787898;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.06);
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 48px 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 面包屑 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
        }

        .breadcrumb-item {
            font-size: 15px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb-item:hover {
            color: var(--accent-purple);
        }

        .breadcrumb-item.active {
            color: var(--text-secondary);
        }

        .breadcrumb-separator {
            color: var(--text-muted);
        }

        /* 页面头部 */
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 20px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            border-bottom: 2px solid var(--accent-purple);
        }

        .detail-title-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .detail-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .detail-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 2px;
        }

        .icon-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: var(--accent-purple);
        }

        .detail-actions {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.35);
        }

        /* 详情卡片 */
        .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .card-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 章节卡片 */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .chapter-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .chapter-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
        }

        .action-btn,
        a.action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .action-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: var(--accent-purple);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: var(--accent-red);
        }

        /* 移除故事信息卡片的花哨字体样式 */
        .story-info-card .ink-label {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            letter-spacing: normal;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 0;
        }

        .story-info-card .ink-label::before {
            display: none;
        }

        .story-info-card .story-header-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: normal;
            text-shadow: none;
        }

        .story-info-card .ink-input,
        .story-info-card .ink-select,
        .story-info-card .ink-textarea {
            font-family: 'Noto Sans SC', sans-serif;
        }

        .story-info-card .cover-icon-ink {
            font-family: 'Noto Sans SC', sans-serif;
        }

        .story-info-card .cover-text-ink,
        .story-info-card .cover-hint-ink,
        .story-info-card .cover-caption {
            font-family: 'Noto Sans SC', sans-serif;
        }

        .story-info-card .ink-char-count {
            font-family: 'Noto Sans SC', sans-serif;
            font-style: normal;
        }

        /* 紧凑布局 - 去掉标题，压缩间距 */
        .story-info-card.compact {
            padding: 20px;
        }

        .story-content-compact {
            display: flex;
            gap: 28px;
            align-items: stretch;
        }

        .story-content-compact .story-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .story-content-compact .story-sidebar {
            flex-shrink: 0;
            width: 260px;
            display: flex;
        }

        .story-content-compact .cover-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .story-content-compact .form-row {
            display: flex;
            gap: 20px;
        }

        .story-content-compact .form-group {
            gap: 8px;
        }

        /* 固定背景故事输入框高度 */
        .story-background-textarea {
            height: 160px;
            resize: none;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .chapter-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .story-content-compact {
                flex-direction: column;
                gap: 24px;
            }
            .story-content-compact .story-sidebar {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 24px 16px;
            }
            .detail-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            .detail-title {
                font-size: 24px;
            }
            .chapter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 面包屑导航 -->
        <div class="breadcrumb">
            <a href="index.html" class="breadcrumb-item">XTALE首页</a>
            <span class="breadcrumb-separator">›</span>
            <a href="story-manager.html" class="breadcrumb-item">故事管理</a>
            <span class="breadcrumb-separator">›</span>
            <span class="breadcrumb-item active">编辑故事</span>
        </div>

        <!-- 页面头部 -->
        <header class="detail-header">
            <div class="detail-title-section">
                <h1 class="detail-title">小雷音寺</h1>
                <button class="icon-btn" title="编辑标题">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>
                <span class="tag tag-type">仙侠武林</span>
            </div>
            <div class="detail-actions">
                <button class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8-11 8-11 8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    预览
                </button>
                <button class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    保存
                </button>
            </div>
        </header>

        <!-- 基本信息卡片 -->
        <div class="detail-card story-info-card compact">
            <div class="story-content-compact">
                <div class="story-main">
                    <div class="form-row">
                        <div class="form-group half">
                            <label class="form-label">所属世界观 <span class="required">*</span></label>
                            <select class="form-select">
                                <option value="">请选择世界观</option>
                                <option value="xianxia" selected>仙侠武林</option>
                                <option value="xuanhuan">玄幻</option>
                                <option value="wuxia">武侠</option>
                                <option value="dushi">都市</option>
                                <option value="kehuan">科幻</option>
                            </select>
                        </div>
                        <div class="form-group half">
                            <label class="form-label">创作状态 <span class="required">*</span></label>
                            <select class="form-select">
                                <option value="draft" selected>草稿</option>
                                <option value="active">连载中</option>
                                <option value="completed">已完结</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">故事背景</label>
                        <textarea class="form-textarea story-background-textarea">唐僧师徒四人西天取经，误入小雷音寺，黄眉老怪设下陷阱，孙悟空如何才能破局？</textarea>
                        <div class="char-count">32 / 500</div>
                    </div>
                </div>
                <div class="story-sidebar">
                    <div class="cover-container ink-border">
                        <label class="form-label ink-label cover-label">故事封面</label>
                        <div class="cover-upload-vertical-story">
                            <div class="cover-placeholder-ink">
                                <div class="cover-icon-ink">卷</div>
                                <div class="cover-text-ink">点击上传封面</div>
                                <div class="cover-hint-ink">推荐 3:4 比例</div>
                            </div>
                            <input type="file" class="cover-input" accept="image/*">
                        </div>
                        <div class="cover-caption">墨香共丹青，画卷藏乾坤</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 章节管理卡片 -->
        <div class="detail-card">
            <div class="card-header">
                <h2 class="card-title">章节管理</h2>
                <button class="btn-primary" style="padding: 8px 16px; font-size: 13px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新增章节
                </button>
            </div>
            <div class="card-body" style="padding: 20px;">
                <div class="chapter-grid">
                    <div class="chapter-card">
                        <div class="chapter-card-cover">
                            <div class="chapter-cover-placeholder">
                                <span class="chapter-order">第一章</span>
                            </div>
                        </div>
                        <div class="chapter-card-info">
                            <div class="chapter-card-title">误入小雷音</div>
                            <div class="chapter-card-desc">唐僧师徒四人来到小雷音寺...</div>
                            <div class="chapter-card-meta">
                                <span class="chapter-card-wordcount">3,245 字</span>
                                <span class="tag tag-status-active">已发布</span>
                            </div>
                            <div class="chapter-card-date">2026-03-17 18:20</div>
                        </div>
                        <div class="chapter-card-actions">
                            <button class="action-btn">👁</button>
                            <a href="chapter-edit.html" class="action-btn">✏️</a>
                            <button class="action-btn delete">🗑️</button>
                        </div>
                    </div>
                    <div class="chapter-card">
                        <div class="chapter-card-cover">
                            <div class="chapter-cover-placeholder">
                                <span class="chapter-order">第二章</span>
                            </div>
                        </div>
                        <div class="chapter-card-info">
                            <div class="chapter-card-title">弥勒佛降临</div>
                            <div class="chapter-card-desc">正当孙悟空一筹莫展之时...</div>
                            <div class="chapter-card-meta">
                                <span class="chapter-card-wordcount">2,876 字</span>
                                <span class="tag tag-status-draft">草稿</span>
                            </div>
                            <div class="chapter-card-date">2026-03-17 20:15</div>
                        </div>
                        <div class="chapter-card-actions">
                            <button class="action-btn">👁</button>
                            <a href="chapter-edit.html" class="action-btn">✏️</a>
                            <button class="action-btn delete">🗑️</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
