<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色云 - XTALE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="character-cloud/css.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-inner">
                <div class="nav-left">
                    <div class="nav-brand">
                        <a href="home.html" class="nav-logo">XTALE</a>
                    </div>
                    <div class="nav-search">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" placeholder="搜索角色..." class="search-input" id="searchInput">
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-links">
                        <a href="home.html" class="nav-link">首页</a>
                        <a href="character-cloud.html" class="nav-link active">角色云</a>
                    </div>
                    <div class="nav-actions">
                        <a href="world-list.html" class="btn-secondary" style="text-decoration: none;">世界观管理</a>
                        <button class="btn-primary">登录</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <section class="page-header">
                <h1 class="page-title">角色云</h1>
                <p class="page-subtitle">探索丰富的角色库，选择适合你故事的角色</p>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-category="all">全部</button>
                    <button class="filter-tab" data-category="protagonist">主角</button>
                    <button class="filter-tab" data-category="support">配角</button>
                    <button class="filter-tab" data-category="antagonist">反派</button>
                    <button class="filter-tab" data-category="npc">NPC</button>
                </div>
                <div class="filter-tags">
                    <span class="filter-tag active" data-tag="all">全部标签</span>
                    <span class="filter-tag" data-tag="ancient">古风</span>
                    <span class="filter-tag" data-tag="modern">现代</span>
                    <span class="filter-tag" data-tag="fantasy">奇幻</span>
                    <span class="filter-tag" data-tag="scifi">科幻</span>
                    <span class="filter-tag" data-tag="romance">言情</span>
                    <span class="filter-tag" data-tag="mystery">悬疑</span>
                </div>
            </section>

            <!-- Character Grid -->
            <section class="character-section">
                <div class="section-header">
                    <div class="section-title-wrap">
                        <span class="section-icon">👥</span>
                        <h2 class="section-title">角色列表</h2>
                    </div>
                    <div class="section-actions">
                        <span class="result-count" id="resultCount">共 12 个角色</span>
                        <select class="sort-select" id="sortSelect">
                            <option value="popular">最受欢迎</option>
                            <option value="newest">最新添加</option>
                            <option value="name">按名称</option>
                        </select>
                    </div>
                </div>

                <div class="character-grid" id="characterGrid">
                    <!-- Character cards will be inserted here -->
                </div>
            </section>

            <!-- Pagination -->
            <section class="pagination-section">
                <div class="pagination">
                    <button class="page-btn prev" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                    </button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn next">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m9 18 6-6-6-6"></path>
                        </svg>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Character Detail Modal -->
    <div class="modal-overlay" id="characterModal">
        <div class="modal character-modal">
            <button class="modal-close" id="closeModal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
            </button>
            <div class="modal-content" id="modalContent">
                <!-- Modal content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">帮助中心</a>
                <a href="#">用户协议</a>
                <a href="#">隐私政策</a>
            </div>
            <p class="footer-copyright">© 2025 XTALE. 专注于优质故事创作与分享. All rights reserved.</p>
            <p class="footer-back"><a href="../../index.html">返回主站首页</a></p>
        </div>
    </footer>

    <script src="character-cloud/js.js"></script>
</body>
</html>
