<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事管理 - XTALE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <a href="/XTALE/index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回XTALE
        </a>
        
        <div class="page-header">
            <div>
                <h1 class="page-title">故事管理</h1>
                <p class="page-desc">管理和维护所有故事内容，包括故事基本信息、章节和数据配置</p>
            </div>
            <button class="btn-primary" id="openModalBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新增故事
            </button>
        </div>
        
        <div class="filter-bar">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" placeholder="搜索故事标题、ID或描述">
            </div>
            <select class="select-box">
                <option value="">所有状态</option>
                <option value="draft">草稿</option>
                <option value="active">连载中</option>
                <option value="completed">已完结</option>
            </select>
            <select class="select-box">
                <option value="">所有世界观</option>
                <option value="xianxia">仙侠</option>
                <option value="xuanhuan">玄幻</option>
                <option value="wuxia">武侠</option>
            </select>
            <button class="btn-secondary">重置筛选</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>故事标题</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>创建日期</th>
                        <th>更新日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>203383542054269337</td>
                        <td>
                            <div class="story-cell">
                                <div class="story-cover">📖</div>
                                <div class="story-info">
                                    <div class="story-name">小雷音寺</div>
                                    <div class="story-desc">sd敢达官方回过防护服干活</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="tag tag-type">仙侠武林</span></td>
                        <td><span class="tag tag-status-draft">草稿</span></td>
                        <td class="date-text">2026-03-17 17:18:45</td>
                        <td class="date-text">2026-03-17 17:18:45</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn">👁</button>
                                <a href="story-detail.html" class="action-btn">✏️</a>
                                <button class="action-btn delete">🗑️</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="table-footer">
                <div class="pagination-info">显示 1 至 1 条，共 3 条</div>
                <div class="pagination">
                    <select class="page-size">
                        <option>10条/页</option>
                        <option>20条/页</option>
                        <option>50条/页</option>
                    </select>
                    <button class="page-btn" disabled>◀</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn" disabled>▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增故事弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2 class="modal-title">新增故事</h2>
                <button class="modal-close" id="closeModalBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="modal-split">
                    <div class="modal-left">
                        <label class="form-label">封面图片</label>
                        <div class="cover-upload-vertical">
                            <div class="cover-placeholder-vertical">
                                <div class="cover-icon-vertical">📖</div>
                                <div class="cover-text-vertical">点击上传封面</div>
                                <div class="cover-hint-vertical">建议 600×800</div>
                            </div>
                            <input type="file" class="cover-input" accept="image/*">
                        </div>
                    </div>
                    <div class="modal-right">
                        <div class="form-grid-vertical">
                            <div class="form-group">
                                <label class="form-label">故事标题 <span class="required">*</span></label>
                                <input type="text" class="form-input" placeholder="请输入故事标题">
                            </div>
                            <div class="form-group">
                                <label class="form-label">世界观类型 <span class="required">*</span></label>
                                <select class="form-select">
                                    <option value="">请选择世界观</option>
                                    <option value="xianxia">仙侠</option>
                                    <option value="xuanhuan">玄幻</option>
                                    <option value="wuxia">武侠</option>
                                    <option value="dushi">都市</option>
                                    <option value="kehuan">科幻</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">初始状态</label>
                                <select class="form-select">
                                    <option value="draft">草稿</option>
                                    <option value="active">连载中</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">故事简介</label>
                                <textarea class="form-textarea" rows="5" placeholder="请输入故事简介，用于在列表中展示..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelBtn">取消</button>
                <button class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    创建故事
                </button>
            </div>
        </div>
    </div>

    <script>
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const modalOverlay = document.getElementById('modalOverlay');

        function openModal() {
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
