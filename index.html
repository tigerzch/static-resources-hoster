<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态资源托管</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index/css.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>
            <h1 class="title">静态资源托管</h1>
            <p class="subtitle">探索我的项目集合</p>
        </header>

        <!-- Projects Section -->
        <section class="projects-section">
            <div class="projects-grid">
                <!-- XTALE Project -->
                <a href="project/xtale/index.html" class="project-card">
                    <div class="project-card-image">
                        <span class="project-icon">✨</span>
                    </div>
                    <div class="project-card-content">
                        <h3 class="project-card-title">XTALE</h3>
                        <p class="project-card-description">故事创作与世界观管理平台，支持故事分章、世界观设定管理</p>
                        <div class="project-tags">
                            <span class="project-tag">Vue 3</span>
                            <span class="project-tag">创作工具</span>
                            <span class="project-tag">Story</span>
                        </div>
                        <div class="project-card-link">
                            查看项目
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </div>
                    </div>
                </a>

                <!-- Company Project -->
                <a href="project/company/index.html" class="project-card">
                    <div class="project-card-image">
                        <span class="project-icon">🏢</span>
                    </div>
                    <div class="project-card-content">
                        <h3 class="project-card-title">企业展示</h3>
                        <p class="project-card-description">现代化企业官网模板，简洁大气的设计风格</p>
                        <div class="project-tags">
                            <span class="project-tag">展示型</span>
                            <span class="project-tag">企业官网</span>
                        </div>
                        <div class="project-card-link">
                            查看项目
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </div>
                    </div>
                </a>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 静态资源托管</p>
        </footer>
    </div>

    <script src="index/js.js"></script>
</body>
</html>
